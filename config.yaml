# 可视化配色配置
colors:
  energy:
    电: "#A8C8E1"
    汽油: "#F4B183"
    柴油: "#D9A066"
    采暖用热: "#C1E0A5"
    生活热水用热: "#F2B3B1"
    自来水: "#F28C28"
    中水: "#7E5AA7"
    燃气: "#B5754C"

# 标煤折算系数 (单位: kg标准煤 / 物理单位)
# 截图公式：
# 电: 用量(kWh) * 1.229 / 10000 => 0.1229 kgce/kWh
# 汽油: 用量(L) * 0.73 * 1.4714 / 1000 => 1.074122 kgce/L
# 天然气: 用量(m³) * 13.3 / 10000 => 1.33 kgce/m³
# 热力: 用量(GJ) * 0.0341 => 34.10 kgce/GJ
# 生活热水热量按热力同口径折算。
# 柴油、自来水、中水未在截图公式中参与折标，暂按 0 保留。
coal_conversion:
  电: 0.1229
  汽油: 1.074122
  柴油: 0
  燃气: 1.33
  采暖用热: 34.10
  自来水: 0
  中水: 0
  生活热水用热: 34.10

# 二氧化碳排放因子 (单位: kgCO2 / 物理单位)
# 截图公式：
# 电: 用量(kWh) * 0.604 / 1000 => 0.604 kgCO2/kWh
# 汽油: 用量(L) * 0.86 * 3.043 / 1000 => 2.61698 kgCO2/L
# 天然气: 用量(m³) * 21.6219 / 10000 => 2.16219 kgCO2/m³
# 热力来源截图中未提供，暂按 0 保留。
co2_conversion:
  电: 0.604
  汽油: 2.61698
  柴油: 0
  燃气: 2.16219
  采暖用热: 0
  自来水: 0
  中水: 0
  生活热水用热: 0

